<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>Juhe Data Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        body {
            background-color: #0b0f19;
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            margin: 0;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #ffcc00;
            padding-bottom: 15px;
        }

        h1 {
            margin: 0;
            font-weight: 800;
            letter-spacing: 1px;
            color: #ffcc00;
        }

        /* Controls */
        .date-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .date-controller {
            display: flex;
            align-items: center;
            background: #161b29;
            border: 1px solid #ffcc00;
            border-radius: 6px;
            padding: 2px;
        }

        .btn-arrow {
            background: transparent;
            border: none;
            color: #ffcc00;
            font-size: 18px;
            cursor: pointer;
            padding: 5px 12px;
        }

        .btn-arrow:hover {
            color: #fff;
            background: rgba(255, 204, 0, 0.2);
            border-radius: 4px;
        }

        input[type="date"] {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            padding: 5px;
            outline: none;
            cursor: pointer;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .btn-nav {
            background: transparent;
            border: 1px solid #00f2ff;
            color: #00f2ff;
            padding: 6px 15px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }

        .btn-nav:hover {
            background: #00f2ff;
            color: #000;
        }

        /* Cards */
        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: #161b29;
            border: 1px solid #2a3b55;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: grab;
            transition: 0.2s;
        }

        .card:hover {
            border-color: #ffcc00;
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.1);
        }

        .card h3 {
            margin: 0 0 10px 0;
            color: #aaa;
            font-size: 14px;
            text-transform: uppercase;
        }

        .num-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .num {
            font-size: 36px;
            font-weight: bold;
            color: #fff;
        }

        .trend-badge {
            font-size: 16px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            cursor: help;
        }

        .trend-up {
            color: #00ff9d;
            background: rgba(0, 255, 157, 0.1);
        }

        .trend-down {
            color: #ff4d4d;
            background: rgba(255, 77, 77, 0.1);
        }

        .trend-flat {
            color: #777;
        }

        /* Charts */
        .charts-row {
            display: flex;
            gap: 20px;
            height: 500px;
            margin-bottom: 20px;
        }

        .chart-box {
            background: #161b29;
            border: 1px solid #2a3b55;
            border-radius: 8px;
            padding: 15px;
            cursor: grab;
        }

        .chart-box:hover {
            border-color: #ffcc00;
        }

        .col-6 {
            flex: 6;
        }

        .col-4 {
            flex: 4;
        }

        .sub-section-title {
            color: #ffcc00;
            font-size: 18px;
            font-weight: bold;
            margin: 40px 0 15px 5px;
            display: flex;
            align-items: center;
            border-left: 4px solid #ffcc00;
            padding-left: 10px;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>🌟 Juhe 聚合数据</h1>
    <div class="date-wrapper">
        <a href="/" class="btn-nav">← 返回主页</a>
        <div class="date-controller">
            <button class="btn-arrow" onclick="adjustDate(-1)">❮</button>
            <input type="date" id="datePicker" onchange="reloadData()">
            <button class="btn-arrow" onclick="adjustDate(1)">❯</button>
        </div>
    </div>
</div>

<!-- KPI Cards -->
<div class="grid-4" id="juhe-cards-sortable">
    <div class="card">
        <h3>有效资源 / 总量 (占比)</h3>
        <div class="num-row">
            <span id="juhe-valid-total" class="num" style="color:#00ff9d">- / -</span>
            <span id="juhe-rate" class="trend-badge trend-flat">-</span>
        </div>
    </div>
    <div class="card">
        <h3>🔥 今日新增</h3>
        <div class="num-row">
            <span id="juhe-today-new" class="num">-</span>
            <span id="juhe-today-trend" class="trend-badge"></span>
        </div>
    </div>
    <div class="card">
        <h3>✨ 今日有效新增</h3>
        <div class="num-row">
            <span id="juhe-today-valid" class="num" style="color:#ffcc00">-</span>
            <span id="juhe-valid-trend" class="trend-badge"></span>
        </div>
    </div>
    <div class="card">
        <h3>💀 失效资源 (Valid < 0)</h3>
        <div class="num-row"><span id="juhe-invalid" class="num" style="color:#ff4d4d">-</span></div>
    </div>
</div>

<!-- Charts Row 1 -->
<div class="charts-row" id="juhe-charts-1">
    <div id="chart-juhe-city" class="chart-box col-6"></div>
    <div id="chart-juhe-source" class="chart-box col-4"></div>
</div>

<div class="sub-section-title"><i class="fas fa-city"></i> 上海市详细数据监控</div>

<!-- Charts Row 2 -->
<div class="charts-row" id="juhe-charts-2">
    <div id="chart-sh-source" class="chart-box col-4"></div>
    <div id="chart-sh-trend" class="chart-box col-6"></div>
</div>

<script>
    const dp = document.getElementById('datePicker');
    dp.valueAsDate = new Date();

    const chartCity = echarts.init(document.getElementById('chart-juhe-city'), 'dark');
    const chartSource = echarts.init(document.getElementById('chart-juhe-source'), 'dark');
    const chartShSource = echarts.init(document.getElementById('chart-sh-source'), 'dark');
    const chartShTrend = echarts.init(document.getElementById('chart-sh-trend'), 'dark');

    const commonOpt = {backgroundColor: 'transparent'};
    [chartCity, chartSource, chartShSource, chartShTrend].forEach(c => c.setOption(commonOpt));

    // 定义富文本样式
    const richStyle = {
        title: {color: '#fff', fontSize: 14, fontWeight: 'bold', align: 'center', padding: [0, 0, 5, 0]},
        hr: {borderColor: '#444', width: '100%', borderWidth: 0.5, height: 0},
        label: {color: '#999', fontSize: 11, padding: [4, 4, 0, 0], align: 'left'},
        // 新增 total 样式，用于显示总量
        total: {color: '#fff', fontSize: 12, fontWeight: 'bold', padding: [4, 0, 0, 0], align: 'left'},
        val: {color: '#00f2ff', fontSize: 12, fontWeight: 'bold', padding: [4, 0, 0, 0], align: 'left'},
        rate: {color: '#00ff9d', fontSize: 11, padding: [4, 0, 0, 0], align: 'left'},
        date: {color: '#ffcc00', fontSize: 11, padding: [4, 0, 0, 0], align: 'right'}
    };

    function adjustDate(d) {
        dp.stepUp(d);
        reloadData();
    }

    function renderTrend(id, percent, prevValue) {
        const el = document.getElementById(id);
        if (prevValue != null) el.title = `昨日数据: ${prevValue}`;
        if (percent > 0) {
            el.innerHTML = `▲ ${percent}%`;
            el.className = 'trend-badge trend-up';
        } else if (percent < 0) {
            el.innerHTML = `▼ ${Math.abs(percent)}%`;
            el.className = 'trend-badge trend-down';
        } else {
            el.innerHTML = '-';
            el.className = 'trend-badge trend-flat';
        }
    }

    async function reloadData() {
        const date = dp.value;

        // 1. 加载通用数据
        fetch(`api/juhe/stats?date=${date}`).then(r => r.json()).then(d => {
            if (d.status !== 'success') return;

            const kpi = d.kpi;
            document.getElementById('juhe-valid-total').innerText = kpi.total_str;
            const rBadge = document.getElementById('juhe-rate');
            rBadge.innerText = kpi.rate + '%';
            rBadge.className = 'trend-badge trend-up';
            document.getElementById('juhe-today-new').innerText = kpi.today_new;
            renderTrend('juhe-today-trend', kpi.trend_new, kpi.prev_new);
            document.getElementById('juhe-today-valid').innerText = kpi.today_valid_new;
            renderTrend('juhe-valid-trend', kpi.trend_valid_new, kpi.prev_valid_new);
            document.getElementById('juhe-invalid').innerText = kpi.invalid;

            // [图表1] 热门城市数据质量
            const cityNames = d.chart_city.map(i => i.name);
            const totalVals = d.chart_city.map(i => i.total);
            const validVals = d.chart_city.map(i => i.valid);
            const rateVals = d.chart_city.map(i => i.rate);

            chartCity.setOption({
                backgroundColor: 'transparent',
                title: {text: '热门城市数据质量', left: 'center', textStyle: {color: '#ffcc00'}},
                tooltip: {trigger: 'axis', axisPointer: {type: 'shadow'}},
                legend: {bottom: 0, textStyle: {color: '#ccc'}},
                grid: {left: '3%', right: '3%', bottom: '10%', containLabel: true},
                xAxis: {type: 'category', data: cityNames, axisLabel: {color: '#fff'}},
                yAxis: [{
                    type: 'value',
                    splitLine: {lineStyle: {color: '#333'}},
                    axisLabel: {color: '#aaa'}
                }, {
                    type: 'value',
                    max: 100,
                    axisLabel: {formatter: '{value}%', color: '#aaa'},
                    splitLine: {show: false}
                }],
                series: [
                    {
                        name: '总量', type: 'bar', data: totalVals, itemStyle: {color: '#333'}, barGap: '-100%', z: 1,
                        label: {show: true, position: 'top', color: '#999', fontSize: 10}
                    },
                    {
                        name: '有效', type: 'bar', data: validVals, itemStyle: {color: '#00ff9d'}, z: 2,
                        label: {show: true, position: 'top', color: '#00ff9d', fontWeight: 'bold'}
                    },
                    {
                        name: '有效率',
                        type: 'line',
                        yAxisIndex: 1,
                        data: rateVals,
                        itemStyle: {color: '#ffcc00'},
                        lineStyle: {width: 3},
                        label: {show: true, formatter: '{c}%', color: '#ffcc00', fontSize: 12, fontWeight: 'bold'},
                        z: 3
                    }
                ]
            }, true);

            // [图表2] 全平台来源分布
            // 修改：富文本中添加 {total|...} 显示总量
            chartSource.setOption({
                backgroundColor: 'transparent',
                title: {text: '全平台来源分布', left: 'center', textStyle: {color: '#ffcc00'}},
                tooltip: {trigger: 'item', formatter: '{b}: {c} ({d}%)'},
                series: [{
                    type: 'pie', radius: ['40%', '65%'], center: ['50%', '55%'],
                    itemStyle: {borderRadius: 5, borderColor: '#161b29', borderWidth: 2},
                    data: d.chart_source,
                    label: {
                        show: true,
                        formatter: function (params) {
                            const dt = params.data;
                            return `{title|${params.name}}\n{hr|}\n` +
                                `{label|总量} {total|${dt.value}}\n` +  // <--- 增加总量
                                `{label|占比} {val|${params.percent}%}\n` +
                                `{label|有效} {val|${dt.valid_count}} {rate|(${dt.valid_rate}%)}`;
                        },
                        rich: richStyle
                    },
                    labelLine: {length: 15, length2: 20, lineStyle: {color: '#555'}}
                }]
            }, true);
        });

        // 2. 加载上海数据
        fetch(`api/juhe/shanghai?date=${date}`).then(r => r.json()).then(d => {

            // [图表3] 上海平台分布
            // 修改：富文本中添加 {total|...} 显示总量
            chartShSource.setOption({
                backgroundColor: 'transparent',
                title: {
                    text: '上海平台分布',
                    subtext: `总数: ${d.total}`,
                    left: 'center',
                    textStyle: {color: '#ffcc00', fontSize: 18},
                    subtextStyle: {color: '#fff', fontSize: 14}
                },
                tooltip: {trigger: 'item', formatter: '{b}: {c} ({d}%)'},
                series: [{
                    type: 'pie',
                    radius: ['35%', '65%'],
                    center: ['50%', '55%'],
                    itemStyle: {borderRadius: 5, borderColor: '#161b29', borderWidth: 2},
                    data: d.sh_breakdown,
                    label: {
                        show: true,
                        formatter: function (params) {
                            const dt = params.data;
                            return `{title|${params.name}}\n{hr|}\n` +
                                `{label|总量} {total|${dt.value}}\n` +  // <--- 增加总量
                                `{label|占比} {val|${params.percent}%}\n` +
                                `{label|有效} {val|${dt.valid_count}} {rate|(${dt.valid_rate}%)}\n` +
                                `{label|最新} {date|${dt.latest_date}}`;
                        },
                        rich: richStyle
                    },
                    labelLine: {length: 15, length2: 20, lineStyle: {color: '#555'}}
                }]
            }, true);

            // [图表4] 近30天新增趋势
            // 修改：为 '所有' 系列添加 label 配置
            chartShTrend.setOption({
                backgroundColor: 'transparent',
                title: {text: '近30天新增趋势对比', left: 'center', textStyle: {color: '#fff', fontSize: 16}},
                tooltip: {trigger: 'axis', axisPointer: {type: 'cross'}},
                legend: {top: 35, data: ['上海新增', '所有'], textStyle: {color: '#ccc'}},
                grid: {left: '3%', right: '3%', bottom: '3%', top: '20%', containLabel: true},
                xAxis: {
                    type: 'category',
                    data: d.history.dates,
                    boundaryGap: false,
                    axisLabel: {color: '#aaa'}
                },
                yAxis: {
                    type: 'value',
                    splitLine: {lineStyle: {color: '#333'}},
                    axisLabel: {color: '#aaa'}
                },
                series: [
                    {
                        name: '上海新增', type: 'line', smooth: true,
                        data: d.history.sh_vals,
                        itemStyle: {color: '#ffcc00'},
                        symbol: 'circle',
                        symbolSize: 6,
                        label: {show: true, position: 'top', color: '#ffcc00', fontSize: 10}
                    },
                    {
                        name: '所有', type: 'line', smooth: true,
                        data: d.history.all_vals,
                        itemStyle: {color: '#00f2ff'},
                        lineStyle: {type: 'solid', width: 2},
                        symbol: 'circle',  // <--- 显式启用 Symbol，以便标签显示在点上
                        symbolSize: 6,
                        label: {show: true, position: 'top', color: '#00f2ff', fontSize: 10} // <--- 添加 Label 显示
                    }
                ]
            }, true);
        });
    }

    // Init Sortable
    new Sortable(document.getElementById('juhe-cards-sortable'), {animation: 150});

    reloadData();
    window.onresize = () => {
        chartCity.resize();
        chartSource.resize();
        chartShSource.resize();
        chartShTrend.resize();
    };
</script>
</body>

</html>
