<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>DataCenter Pro - 用户报告: {{ identity }}</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <style>
        /* --- 全局暗黑主题适配 --- */
        body {
            background-color: #0b0f19;
            color: #fff;
            font-family: 'Segoe UI', Roboto, "Microsoft YaHei", sans-serif;
            padding: 20px;
            margin: 0;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #2a3b55;
            padding-bottom: 15px;
        }

        h1 span {
            color: #00f2ff;
        }

        /* 月份控制器 */
        .month-ctrl-wrapper {
            display: flex;
            align-items: center;
            background: #161b29;
            border: 1px solid #00f2ff;
            border-radius: 6px;
            padding: 2px;
        }

        .btn-arrow {
            background: transparent;
            border: none;
            color: #00f2ff;
            font-size: 18px;
            cursor: pointer;
            padding: 5px 12px;
        }

        .btn-arrow:hover {
            background: rgba(0, 242, 255, 0.1);
            border-radius: 4px;
        }

        .current-month {
            color: #fff;
            font-weight: bold;
            padding: 0 10px;
            min-width: 90px;
            text-align: center;
        }

        .section-wrapper {
            margin-bottom: 20px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 15px;
            background: rgba(22, 27, 41, 0.8);
            border-radius: 6px;
            border-left: 5px solid;
            cursor: pointer;
            user-select: none;
            margin-bottom: 15px;
        }

        .theme-nice {
            border-color: #00f2ff;
            color: #00f2ff;
        }

        .theme-table {
            border-color: #fff;
            color: #fff;
        }

        .draggable-handle {
            cursor: grab;
            margin-right: 10px;
            color: #555;
        }

        /* 卡片 */
        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: #161b29;
            border: 1px solid #2a3b55;
            border-radius: 8px;
            padding: 20px;
        }

        .num {
            font-size: 36px;
            font-weight: bold;
            color: #fff;
        }

        /* 布局容器 */
        .analysis-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: flex-start;
        }

        .heatmap-container,
        .account-stats-container {
            background: #161b29;
            border: 1px solid #2a3b55;
            border-radius: 8px;
            padding: 15px;
            height: 440px;
            position: relative;
        }

        .heatmap-container {
            flex: 5;
        }

        .account-stats-container {
            flex: 5;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .account-stats-scroll {
            overflow-y: auto;
            flex: 1;
            margin-top: 10px;
        }

        /* 滚动条适配 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0b0f19;
        }

        ::-webkit-scrollbar-thumb {
            background: #2a3b55;
            border-radius: 4px;
        }

        /* 搜索工具栏 */
        .toolbar {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            padding: 15px;
            background: #161b29;
            border-radius: 8px;
            border: 1px solid #2a3b55;
            align-items: center;
        }

        .search-box {
            flex: 1;
            display: flex;
            align-items: center;
            background: #0b0f19;
            border: 1px solid #2a3b55;
            border-radius: 4px;
            padding: 0 10px;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: #fff;
            padding: 10px;
            width: 100%;
            outline: none;
        }

        .filter-select {
            background: #0b0f19;
            border: 1px solid #2a3b55;
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }

        .btn-reset {
            background: transparent;
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }

        /* 表格：手动列宽支持 */
        .table-container {
            background: #161b29;
            border: 1px solid #2a3b55;
            border-radius: 8px;
            max-height: 700px;
            overflow: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            table-layout: fixed;
        }

        th {
            text-align: left;
            padding: 15px 12px;
            color: #889eb5;
            border-bottom: 1px solid #2a3b55;
            background: #1c2333;
            position: sticky;
            top: 0;
            z-index: 10;
            resize: horizontal;
            overflow: hidden;
            white-space: nowrap;
            cursor: pointer;
        }

        th:hover {
            color: #00f2ff;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #1e273b;
            color: #ddd;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        tr:hover {
            background-color: #1f293a;
        }

        .col-id {
            color: #00f2ff;
            font-family: monospace;
            font-weight: bold;
        }

        .badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            background: rgba(136, 158, 181, 0.1);
            color: #889eb5;
        }

        .type-video {
            background: rgba(0, 255, 157, 0.1);
            color: #00ff9d;
        }

        .type-image {
            background: rgba(255, 204, 0, 0.1);
            color: #ffcc00;
        }

        .user-link {
            color: #fff;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: 0.2s;
        }

        .user-link:hover {
            color: #00f2ff;
            border-bottom-color: #00f2ff;
        }

        .copy-id {
            color: #555;
            font-size: 11px;
            cursor: pointer;
            display: inline-block;
            margin-top: 2px;
        }

        .copy-id:hover {
            color: #00f2ff;
        }

        .btn-link {
            color: #00f2ff;
            border: 1px solid #00f2ff;
            padding: 2px 8px;
            border-radius: 3px;
            text-decoration: none;
            font-size: 12px;
            transition: 0.2s;
        }

        .btn-link:hover {
            background: #00f2ff;
            color: #000;
        }

        /* 追加数据专用分页栏 */
        .pagination-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #161b29;
            border: 1px solid #2a3b55;
            border-top: none;
        }

        .btn-page {
            background: #0b0f19;
            border: 1px solid #2a3b55;
            color: #fff;
            padding: 8px 25px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-page:hover:not(:disabled) {
            border-color: #00f2ff;
            color: #00f2ff;
        }

        .btn-page:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* 底部月份切换栏样式 */
        .heatmap-footer-ctrl {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: -10px;
            /* 根据实际视觉调整，上移一点靠近图表 */
            padding-bottom: 10px;
        }

        .footer-month-text {
            color: #00f2ff;
            font-size: 18px;
            font-weight: bold;
            min-width: 120px;
            text-align: center;
            letter-spacing: 1px;
        }

        /* 保持按钮样式一致 */
        .heatmap-footer-ctrl .btn-arrow {
            background: rgba(22, 27, 41, 0.8);
            border: 1px solid #00f2ff;
            border-radius: 4px;
            color: #00f2ff;
            padding: 2px 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .heatmap-footer-ctrl .btn-arrow:hover {
            background: #00f2ff;
            color: #000;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>📊 <span>用户报告</span>: {{ identity }}</h1>
        <button onclick="location.href='/board'" class="btn-page"
            style="background:#00f2ff; color:#000; font-weight:bold;">返回主页</button>
    </div>

    <div id="main-sortable-container">
        <div class="section-wrapper" id="wrapper-stats">
            <div class="section-header theme-nice" onclick="toggleSection('wrapper-stats')">
                <div class="section-title-group"><i class="fas fa-grip-vertical draggable-handle"></i> 活跃度日历 & 账号分布统计
                </div>
                <i class="fas fa-chevron-down toggle-icon"></i>
            </div>
            <div class="section-content">
                <div class="grid-4" id="cards-sortable">
                    <div class="card" data-id="c1">
                        <h3>总计消息</h3>
                        <div class="num" id="s-total">-</div>
                    </div>
                    <div class="card" data-id="c2">
                        <h3>作品数量</h3>
                        <div class="num" id="s-works">-</div>
                    </div>
                    <div class="card" data-id="c3">
                        <h3>视频数量</h3>
                        <div class="num" id="s-video" style="color:#00ff9d">-</div>
                    </div>
                    <div class="card" data-id="c4">
                        <h3>图片数量</h3>
                        <div class="num" id="s-image" style="color:#ffcc00">-</div>
                    </div>
                </div>

                <div class="analysis-row" id="analysis-sortable">
                    <div class="heatmap-container">
                        <div id="chart-heatmap" style="height: 380px; width: 100%;"></div>
                        <div class="heatmap-footer-ctrl">
                            <button class="btn-arrow" onclick="changeMonth(-1)">❮</button>
                            <span id="footerMonthLabel" class="footer-month-text">-</span>
                            <button class="btn-arrow" onclick="changeMonth(1)">❯</button>
                        </div>
                    </div>
                    <div class="account-stats-container" data-id="account-box">
                        <h4 style="margin-top:0; color:#00f2ff; font-size:14px;"><i class="fas fa-users"></i> 关联账号维度统计
                        </h4>
                        <div class="account-stats-scroll">
                            <table>
                                <thead>
                                    <tr>
                                        <th>账号信息</th>
                                        <th style="width: 100px;">消息数</th>
                                        <th style="width: 100px;">作品数</th>
                                    </tr>
                                </thead>
                                <tbody id="accountStatsBody">
                                    <tr>
                                        <td colspan="3" style="text-align:center; color:#555;">加载中...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="section-wrapper" id="wrapper-table">
            <div class="section-header theme-table" onclick="toggleSection('wrapper-table')">
                <div class="section-title-group"><i class="fas fa-grip-vertical draggable-handle"></i> 详细历史记录 <span
                        id="filterStatus" style="color:#00f2ff; font-size:12px; margin-left:10px;"></span></div>
                <i class="fas fa-chevron-down toggle-icon"></i>
            </div>
            <div class="section-content">
                <div class="toolbar">
                    <div class="search-box"><i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="搜索..." oninput="applyFilters()">
                    </div>
                    <select id="platFilter" class="filter-select" onchange="applyFilters()">
                        <option value="">所有平台</option>
                        <option value="抖音">抖音</option>
                        <option value="微博">微博</option>
                        <option value="Instagram">Instagram</option>
                    </select>
                    <select id="fileFilter" class="filter-select" onchange="applyFilters()">
                        <option value="">所有类型</option>
                        <option value="视频">视频</option>
                        <option value="图片">图片</option>
                        <option value="文本">纯文本</option>
                    </select>
                    <button class="btn-reset" onclick="resetAll()">重置</button>
                </div>

                <div class="table-container">
                    <table id="mainTable">
                        <thead>
                            <tr>
                                <th style="width:20px">序号</th>
                                <th onclick="handleSort('id')" style="width:30px">ID <i class="fas fa-sort"></i></th>
                                <th onclick="handleSort('time')" style="width:100px">时间 <i class="fas fa-sort"></i></th>
                                <th onclick="handleSort('platform')" style="width:30px">平台 <i class="fas fa-sort"></i>
                                </th>
                                <th onclick="handleSort('file_type')" style="width:30px">类型 <i class="fas fa-sort"></i>
                                </th>
                                <th onclick="handleSort('username')" style="width:50px">用户名 <i class="fas fa-sort"></i>
                                </th>
                                <th onclick="handleSort('caption')" style="width:200px">文件名 <i class="fas fa-sort"></i>
                                </th>
                                <th onclick="handleSort('text')" style="width:300px">描述详情 <i class="fas fa-sort"></i>
                                </th>
                                <th onclick="handleSort('url')" style="width:250px">源链接 <i class="fas fa-sort"></i></th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
                <div class="pagination-bar">
                    <div id="pageInfo" style="color:#889eb5">已加载 1 页，共 0 条数据</div>
                    <button class="btn-page" id="btnNext" onclick="loadMore()">加载更多数据</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const identity = "{{ identity }}";
        let tableRawData = [], tableFilteredData = [], currentMonth = "", currentPage = 1, totalPages = 1;
        let currentSort = { col: 'time', dir: 'desc' };
        let filterDate = null;

        const chartHeatmap = echarts.init(document.getElementById('chart-heatmap'), 'dark');

        // 复制功能兼容方案
        function copyText(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => showTip("✅ 已复制 ID"));
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = text; document.body.appendChild(textArea); textArea.select();
                document.execCommand('copy'); document.body.removeChild(textArea);
                showTip("✅ 已复制 ID");
            }
        }
        function showTip(msg) { const ot = document.title; document.title = msg; setTimeout(() => document.title = ot, 1000); }

        async function init() {
            new Sortable(document.getElementById('main-sortable-container'), { animation: 150, handle: '.draggable-handle' });
            new Sortable(document.getElementById('cards-sortable'), { animation: 150 });
            new Sortable(document.getElementById('analysis-sortable'), { animation: 150 });

            const res = await fetch(`/board/api/user/report?identity=${encodeURIComponent(identity)}`);
            const d = await res.json();

            document.getElementById('s-total').innerText = d.stats.total;
            document.getElementById('s-works').innerText = d.stats.works;
            document.getElementById('s-video').innerText = d.stats.video;
            document.getElementById('s-image').innerText = d.stats.image;

            currentMonth = d.info.current_month;
            renderHeatmap(currentMonth, d.heatmap);
            renderAccountTable(d.info.accounts_stats);

            // 初始加载第一页数据
            tableRawData = d.messages;
            totalPages = d.total_pages || 1;
            applyFilters();
        }

        function renderAccountTable(stats) {
            const body = document.getElementById('accountStatsBody');
            body.innerHTML = stats.map(a => {
                let homeUrl = "#", icon = '<i class="fas fa-user-circle" style="margin-right:8px;"></i>';
                const plat = a.platform;
                if (plat.includes("微博")) { homeUrl = `https://weibo.com/u/${a.userid}`; icon = '<i class="fab fa-weibo" style="color:#eb7350; margin-right:8px; font-size:16px;"></i>'; }
                else if (plat.includes("抖音")) { homeUrl = `https://www.douyin.com/user/${a.userid}`; icon = '<i class="fab fa-tiktok" style="color:#fff; margin-right:8px; font-size:16px;"></i>'; }
                else if (plat.includes("Instagram")) { homeUrl = `https://www.instagram.com/${a.username}`; icon = '<i class="fab fa-instagram" style="color:#e1306c; margin-right:8px; font-size:16px;"></i>'; }

                return `<tr>
                <td><div style="display:flex;align-items:center;">${icon}<div>
                    <a href="${homeUrl}" target="_blank" class="user-link"><strong>${a.username}</strong></a><br>
                    <span class="copy-id" onclick="copyText('${a.userid}')"><i class="far fa-copy"></i> ${a.userid}</span>
                </div></div></td>
                <td style="color:#00ff9d; font-weight:bold">${a.msg_count}</td>
                <td style="color:#ffcc00; font-weight:bold">${a.work_count}</td>
            </tr>`;
            }).join('');
        }

        function renderHeatmap(month, raw) {
            const parts = month.split('-');
            document.getElementById('footerMonthLabel').innerText = `${parts[0]}年${parts[1]}月`;
            const [year, mNum] = month.split('-');
            const days = new Date(year, mNum, 0).getDate();
            const map = {}; raw.forEach(i => map[i[0]] = i[1]);
            const full = []; for (let d = 1; d <= days; d++) { const ds = `${year}-${String(mNum).padStart(2, '0')}-${String(d).padStart(2, '0')}`; full.push([ds, map[ds] || 0]); }

            chartHeatmap.setOption({
                backgroundColor: 'transparent',
                tooltip: { formatter: p => `${p.value[0]}: ${p.value[1]}条` },
                visualMap: {
                    min: 0, max: Math.max(...full.map(i => i[1]), 5), calculable: true, orient: 'vertical', right: '0', top: 'center',
                    inRange: { color: ['#1b233e', '#004a7c', '#0072ff', '#00f2ff'] }, textStyle: { color: '#889eb5', fontSize: 10 }
                },
                calendar: {
                    top: 65, left: 40, right: 40, bottom: 60, range: month, orient: 'vertical',
                    cellSize: ['auto', 50], dayLabel: { firstDay: 1, nameMap: 'cn', color: '#889eb5' },
                    monthLabel: { show: false },
                    yearLabel: { show: false },
                    itemStyle: { borderWidth: 2, borderColor: '#0b0f19' }
                },
                series: [{
                    type: 'heatmap', coordinateSystem: 'calendar', data: full,
                    label: {
                        show: true, textBorderColor: '#000', textBorderWidth: 2,
                        formatter: p => `{date|${parseInt(p.value[0].split('-')[2])}号}  {val|${p.value[1]}个}`,
                        rich: {
                            date: { fontSize: 16, color: '#ffffff', fontWeight: 'bold' },
                            val: { fontSize: 13, color: '#00ff00', padding: [4, 0] }
                        }
                    }
                }]
            }, true);

            chartHeatmap.off('click');
            chartHeatmap.on('click', (p) => {
                if (p.componentType === 'series') {
                    filterDate = p.data[0];
                    document.getElementById('filterStatus').innerText = `(已筛选: ${filterDate})`;
                    resetAndFetch(filterDate);
                }
            });
            chartHeatmap.getZr().on('click', (p) => { if (!p.target) { filterDate = null; document.getElementById('filterStatus').innerText = ""; resetAndFetch(null); } });
        }

        async function changeMonth(dir) {
            let [y, m] = currentMonth.split('-').map(Number);
            m += dir; if (m > 12) { y++; m = 1; } else if (m < 1) { y--; m = 12; }
            currentMonth = `${y}-${String(m).padStart(2, '0')}`;
            const res = await fetch(`/board/api/user/heatmap?identity=${encodeURIComponent(identity)}&month=${currentMonth}`);
            const d = await res.json();
            renderHeatmap(currentMonth, d.data);
        }

        // --- 追加模式逻辑 ---
        async function loadMore() {
            if (currentPage >= totalPages) return;
            currentPage++;
            let url = `/board/api/user/messages?identity=${encodeURIComponent(identity)}&page=${currentPage}`;
            if (filterDate) url += `&date=${filterDate}`;

            const res = await fetch(url);
            const d = await res.json();
            // 追加新数据到旧数组
            tableRawData.push(...d.messages);
            applyFilters();
        }

        async function resetAndFetch(date) {
            currentPage = 1;
            tableRawData = []; // 清空数据
            let url = `/board/api/user/messages?identity=${encodeURIComponent(identity)}&page=1`;
            if (date) url += `&date=${date}`;

            const res = await fetch(url);
            const d = await res.json();
            tableRawData = d.messages;
            totalPages = d.total_pages || 1;
            applyFilters();
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const plat = document.getElementById('platFilter').value;
            const type = document.getElementById('fileFilter').value;

            tableFilteredData = tableRawData.filter(r => {
                const ms = !search || Object.values(r).some(v => String(v).toLowerCase().includes(search));
                const mp = !plat || r.platform === plat;
                const mt = !type || r.file_type === type;
                return ms && mp && mt;
            });

            doSort();
            renderTable();
        }

        function handleSort(col) {
            if (currentSort.col === col) currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
            else { currentSort.col = col; currentSort.dir = 'desc'; }
            applyFilters();
        }

        function doSort() {
            const { col, dir } = currentSort;
            tableFilteredData.sort((a, b) => {
                let vA = a[col], vB = b[col];
                if (col === 'id') return dir === 'asc' ? vA - vB : vB - vA;
                vA = (vA || "").toString(); vB = (vB || "").toString();
                return dir === 'asc' ? vA.localeCompare(vB, 'zh-Hans-CN') : vB.localeCompare(vA, 'zh-Hans-CN');
            });
        }

        function renderTable() {
            const tb = document.getElementById('tableBody');
            tb.innerHTML = tableFilteredData.map((r, i) => {
                const tCls = r.file_type === '视频' ? 'type-video' : (r.file_type === '图片' ? 'type-image' : '');
                let ico = '<i class="fas fa-globe plat-icon"></i>';
                if (r.platform === '抖音') ico = '<i class="fab fa-tiktok plat-icon c-douyin"></i>';
                if (r.platform === '微博') ico = '<i class="fab fa-weibo plat-icon c-weibo"></i>';
                if (r.platform === 'Instagram') ico = '<i class="fab fa-instagram plat-icon c-ins"></i>';
                return `<tr>
                <td style="color:#555">${i + 1}</td>
                <td class="col-id">${r.id}</td>
                <td style="color:#aaa; font-family:monospace;">${r.time}</td>
                <td>${ico} ${r.platform}</td>
                <td><span class="badge ${tCls}">${r.file_type}</span></td>
                <td><strong>${r.username}</strong></td>
                <td title="${r.caption || '-'}">${r.caption || '-'}</td>
                <td title="${r.text || '-'}">${r.text || '-'}</td>
                <td><a href="${r.url}" target="_blank" class="btn-link" title="${r.url}">${r.url}</a></td>
            </tr>`;
            }).join('');

            document.getElementById('pageInfo').innerText = `已加载 ${currentPage} 页，当前展示 ${tableFilteredData.length} 条数据`;
            document.getElementById('btnNext').disabled = (currentPage >= totalPages);
        }

        function resetAll() {
            document.getElementById('searchInput').value = '';
            document.getElementById('platFilter').value = '';
            document.getElementById('fileFilter').value = '';
            currentSort = { col: 'time', dir: 'desc' };
            filterDate = null;
            document.getElementById('filterStatus').innerText = "";
            resetAndFetch(null);
        }

        function toggleSection(id) {
            const wrapper = document.getElementById(id);
            const content = wrapper.querySelector('.section-content');
            const icon = wrapper.querySelector('.toggle-icon');
            const isHidden = content.style.display === 'none';
            content.style.display = isHidden ? 'block' : 'none';
            icon.style.transform = isHidden ? 'rotate(0deg)' : 'rotate(-90deg)';
            if (id === 'wrapper-stats' && !isHidden) setTimeout(() => chartHeatmap.resize(), 100);
        }

        init();
        window.onresize = () => chartHeatmap.resize();
    </script>
</body>

</html>
