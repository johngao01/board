<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>DataCenter Pro</title>
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <style>
        /* --- 全局设置 --- */
        body {
            background-color: #0b0f19;
            color: #fff;
            font-family: 'Segoe UI', Roboto, "Microsoft YaHei", sans-serif;
            padding: 20px;
            margin: 0;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #2a3b55;
            padding-bottom: 15px;
        }

        h1 {
            margin: 0;
            font-weight: 800;
            letter-spacing: 1px;
        }

        h1 span {
            color: #00f2ff;
        }

        /* Date Controller */
        .date-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .date-controller {
            display: flex;
            align-items: center;
            background: #161b29;
            border: 1px solid #00f2ff;
            border-radius: 6px;
            padding: 2px;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.1);
        }

        .btn-arrow {
            background: transparent;
            border: none;
            color: #00f2ff;
            font-size: 18px;
            cursor: pointer;
            padding: 5px 12px;
            transition: 0.2s;
        }

        .btn-arrow:hover {
            color: #fff;
            background: rgba(0, 242, 255, 0.2);
            border-radius: 4px;
        }

        input[type="date"] {
            background: transparent;
            border: none;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            font-size: 16px;
            font-weight: bold;
            padding: 5px;
            outline: none;
            cursor: pointer;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .btn-today {
            background: #00f2ff;
            color: #000;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-today:hover {
            box-shadow: 0 0 10px #00f2ff;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0b0f19;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #2a3b55;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00f2ff;
            box-shadow: 0 0 5px rgba(0, 242, 255, 0.5);
        }

        .draggable-handle {
            cursor: grab;
            margin-right: 10px;
            color: #555;
        }

        .draggable-handle:hover {
            color: #fff;
        }

        .sortable-ghost {
            opacity: 0.4;
            background: #2a3b55 !important;
            border: 1px dashed #00f2ff !important;
        }

        .section-wrapper {
            margin-bottom: 20px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 15px;
            background: rgba(22, 27, 41, 0.8);
            border-radius: 6px;
            border-left: 5px solid;
            cursor: pointer;
            transition: 0.2s;
            user-select: none;
            margin-bottom: 15px;
        }

        .section-header:hover {
            background: rgba(42, 59, 85, 0.8);
        }

        .section-title-group {
            display: flex;
            align-items: center;
        }

        .section-title {
            font-size: 20px;
            font-weight: bold;
            margin: 0;
        }

        .toggle-icon {
            transition: transform 0.3s ease;
            font-size: 16px;
            color: #889eb5;
        }

        .collapsed .toggle-icon {
            transform: rotate(-90deg);
        }

        .theme-nice {
            border-color: #00f2ff;
            color: #00f2ff;
        }

        .theme-tiktok {
            border-color: #bd00ff;
            color: #bd00ff;
        }

        .theme-table {
            border-color: #fff;
            color: #fff;
        }

        .section-content {
            transition: all 0.3s ease;
        }

        .hidden-content {
            display: none;
        }

        .sub-title {
            font-size: 14px;
            color: #666;
            margin: 10px 0;
            display: flex;
            align-items: center;
            cursor: pointer;
            width: fit-content;
        }

        .sub-title:hover {
            color: #00f2ff;
        }

        .sub-title i {
            margin-right: 5px;
            transition: 0.2s;
        }

        .sub-collapsed i {
            transform: rotate(-90deg);
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: #161b29;
            border: 1px solid #2a3b55;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: grab;
        }

        .card:active {
            cursor: grabbing;
        }

        .card h3 {
            margin: 0 0 10px 0;
            color: #889eb5;
            font-size: 14px;
            text-transform: uppercase;
        }

        .num-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .num {
            font-size: 36px;
            font-weight: bold;
            color: #fff;
        }

        .clickable-num {
            cursor: pointer;
            border-bottom: 1px dashed transparent;
            transition: all 0.2s;
        }

        .clickable-num:hover {
            color: #fff;
            border-bottom-color: #fff;
            text-shadow: 0 0 5px #fff;
        }

        .trend-badge {
            font-size: 16px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            cursor: help;
        }

        .trend-up {
            color: #00ff9d;
            background: rgba(0, 255, 157, 0.1);
        }

        .trend-down {
            color: #ff4d4d;
            background: rgba(255, 77, 77, 0.1);
        }

        .trend-flat {
            color: #777;
        }

        /* Charts - 恢复三栏布局 */
        .charts-row {
            display: flex;
            gap: 20px;
            height: 420px;
            margin-bottom: 20px;
        }

        /* 25% - 25% - 50% */
        .chart-col-small {
            flex: 2.5;
            background: #161b29;
            border: 1px solid #2a3b55;
            border-radius: 8px;
            padding: 15px;
            cursor: grab;
        }

        .chart-col-large {
            flex: 5;
            background: #161b29;
            border: 1px solid #2a3b55;
            border-radius: 8px;
            padding: 15px;
            cursor: grab;
        }

        .chart-col-small:active,
        .chart-col-large:active {
            cursor: grabbing;
        }

        .toolbar {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            padding: 15px;
            background: #161b29;
            border-radius: 8px;
            border: 1px solid #2a3b55;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            display: flex;
            align-items: center;
            background: #0b0f19;
            border: 1px solid #2a3b55;
            border-radius: 4px;
            padding: 0 10px;
        }

        .search-box i {
            color: #555;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: #fff;
            padding: 10px;
            width: 100%;
            outline: none;
        }

        .filter-select {
            background: #0b0f19;
            border: 1px solid #2a3b55;
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }

        .btn-reset {
            background: transparent;
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin-left: auto;
            transition: 0.2s;
        }

        .btn-reset:hover {
            background: #ff4d4d;
            color: #fff;
        }

        .table-container {
            background: #161b29;
            border: 1px solid #2a3b55;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-height: 800px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 1000px;
        }

        th {
            text-align: left;
            padding: 15px 12px;
            color: #889eb5;
            border-bottom: 1px solid #2a3b55;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            background: #161b29;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th:hover {
            color: #00f2ff;
            background: #1c2333;
        }

        th i {
            margin-left: 5px;
            font-size: 10px;
            color: #444;
        }

        th.sort-asc i.fa-sort-up {
            color: #00f2ff;
        }

        th.sort-desc i.fa-sort-down {
            color: #00f2ff;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #1e273b;
            color: #ddd;
            vertical-align: middle;
        }

        tr:hover {
            background-color: #1f293a;
        }

        .col-no {
            width: 50px;
            text-align: center;
            color: #666;
        }

        .col-id {
            width: 80px;
            font-family: monospace;
            color: #00f2ff;
        }

        .col-time {
            width: 90px;
            font-family: monospace;
            color: #aaa;
        }

        .col-plat {
            width: 100px;
        }

        .col-type {
            width: 80px;
            text-align: center;
        }

        .col-user {
            width: 150px;
            font-weight: bold;
        }

        .col-content {
            max-width: 350px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .col-link {
            width: 60px;
            text-align: center;
        }

        .plat-icon {
            margin-right: 6px;
            width: 14px;
            display: inline-block;
            text-align: center;
        }

        .c-douyin {
            color: #fff;
        }

        .c-weibo {
            color: #ffcc00;
        }

        .c-ins {
            color: #bd00ff;
        }

        .badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            width: 40px;
            text-align: center;
        }

        .type-follow {
            background: rgba(0, 255, 157, 0.1);
            color: #00ff9d;
            border: 1px solid rgba(0, 255, 157, 0.3);
        }

        .type-like {
            background: rgba(255, 204, 0, 0.1);
            color: #ffcc00;
            border: 1px solid rgba(255, 204, 0, 0.3);
        }

        .btn-link {
            color: #00f2ff;
            border: 1px solid #00f2ff;
            padding: 2px 8px;
            border-radius: 3px;
            text-decoration: none;
            font-size: 12px;
            transition: 0.2s;
        }

        .btn-link:hover {
            background: #00f2ff;
            color: #000;
        }

        .status-bar {
            font-size: 12px;
            color: #666;
            padding: 10px 15px;
            text-align: right;
        }

        .messageinfo-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #161b29;
            border: 1px solid #2a3b55;
            border-top: none;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>🚀 Data<span>Center</span></h1>
    <div class="date-wrapper">
        <div class="date-controller">
            <button class="btn-arrow" onclick="adjustDate(-1)">❮</button>
            <input type="date" id="datePicker" onchange="handleDateChange()">
            <button class="btn-arrow" onclick="adjustDate(1)">❯</button>
        </div>
        <button class="btn-today" onclick="goToToday()">今天</button>
    </div>
</div>

<div id="main-sortable-container">

    <!-- 1. NiceBot -->
    <div class="section-wrapper" id="wrapper-nice" data-id="wrapper-nice">
        <div class="section-header theme-nice" onclick="toggleSection('sec-nice')">
            <div class="section-title-group"><i class="fas fa-grip-vertical draggable-handle"></i>
                <div class="section-title">NiceBot 统计信息</div>
            </div>
            <i class="fas fa-chevron-down toggle-icon" id="icon-sec-nice"></i>
        </div>

        <div id="sec-nice" class="section-content">
            <div id="nice-inner-sortable">
                <!-- A: 卡片 -->
                <div class="sub-section-wrapper" id="sub-nice-a" data-id="sub-nice-a">
                    <div class="sub-title" onclick="toggleSection('sub-nice-cards')"><i class="fas fa-caret-down"
                                                                                        id="icon-sub-nice-cards"></i>
                        核心指标
                    </div>
                    <div id="sub-nice-cards" class="section-content">
                        <div class="grid-4" id="cards-sortable">
                            <div class="card" data-id="n-card-1">
                                <h3>消息总数</h3>
                                <div class="num-row"><span id="nice-total" class="num">-</span><span
                                        id="nice-total-trend" class="trend-badge"></span></div>
                            </div>
                            <div class="card" data-id="n-card-2">
                                <h3>用户数量</h3>
                                <div class="num-row"><span id="nice-users" class="num">-</span><span
                                        id="nice-users-trend" class="trend-badge"></span></div>
                            </div>
                            <div class="card" data-id="n-card-3">
                                <h3>作品数量</h3>
                                <div class="num-row"><span id="nice-works" class="num">-</span><span
                                        id="nice-works-trend" class="trend-badge"></span></div>
                            </div>
                            <div class="card" data-id="n-card-4">
                                <h3>视频 / 图片</h3>
                                <div class="num-row" style="color:#00f2ff"><span id="nice-files-video"
                                                                                 class="num clickable-num"
                                                                                 onclick="filterByFile('视频')">-</span><span
                                        class="num">/</span><span id="nice-files-image" class="num clickable-num"
                                                                  onclick="filterByFile('图片')">-</span><span
                                        id="nice-files-trend"
                                        class="trend-badge"></span></div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- B: 图表 (恢复三栏) -->
                <div class="sub-section-wrapper" id="sub-nice-b" data-id="sub-nice-b">
                    <div class="sub-title" onclick="toggleSection('sub-nice-charts')"><i class="fas fa-caret-down"
                                                                                         id="icon-sub-nice-charts"></i>
                        数据图表
                    </div>
                    <div id="sub-nice-charts" class="section-content">
                        <div class="charts-row" id="nice-charts-sortable">
                            <!-- 左: 消息分布 (饼图) -->
                            <div id="chart-msg" class="chart-col-small" data-id="c-msg"></div>
                            <!-- 中: 作品分布 (嵌套环) -->
                            <div id="chart-nested" class="chart-col-small" data-id="c-nested"></div>
                            <!-- 右: 历史趋势 (柱状) -->
                            <div id="chart-history" class="chart-col-large" data-id="c-hist"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. TikTok -->
    <div class="section-wrapper" id="wrapper-tiktok" data-id="wrapper-tiktok">
        <div class="section-header theme-tiktok" onclick="toggleSection('sec-tiktok')">
            <div class="section-title-group"><i class="fas fa-grip-vertical draggable-handle"></i>
                <div class="section-title">TikTok Bot 统计信息</div>
            </div>
            <i class="fas fa-chevron-down toggle-icon" id="icon-sec-tiktok"></i>
        </div>
        <div id="sec-tiktok" class="section-content">
            <div class="grid-4" id="tiktok-cards-sortable">
                <div class="card" data-id="t-card-1">
                    <h3>🕷️ 当天爬取 Aweme</h3>
                    <div class="num-row"><span id="tk-scraped" class="num">-</span><span id="tk-scraped-trend"
                                                                                         class="trend-badge"></span>
                    </div>
                </div>
                <div class="card" data-id="t-card-2">
                    <h3>👥 活跃用户</h3>
                    <div class="num-row"><span id="tk-active" class="num">-</span><span id="tk-active-trend"
                                                                                        class="trend-badge"></span>
                    </div>
                </div>
                <div class="card" data-id="t-card-3">
                    <h3>🔥 新增用户</h3>
                    <div class="num-row"><span id="tk-new" class="num">-</span><span id="tk-new-trend"
                                                                                     class="trend-badge"></span></div>
                </div>
                <div class="card" data-id="t-card-4">
                    <h3>📊 人均爬取量</h3>
                    <div class="num-row"><span id="tk-avg" class="num" style="color: #bd00ff">-</span><span
                            style="font-size:14px; color:#888; margin-left:5px">条/人</span></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. 表格 -->
    <div class="section-wrapper" id="wrapper-table" data-id="wrapper-table">
        <div class="section-header theme-table" onclick="toggleSection('sec-table')">
            <div class="section-title-group"><i class="fas fa-grip-vertical draggable-handle"></i>
                <div class="section-title">NiceBot 消息明细</div>
            </div>
            <i class="fas fa-chevron-down toggle-icon" id="icon-sec-table"></i>
        </div>
        <div id="sec-table" class="section-content">
            <div class="toolbar">
                <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput"
                                                                            placeholder="搜索..."
                                                                            oninput="saveAndApplyFilters()"></div>
                <select id="platFilter" class="filter-select" onchange="saveAndApplyFilters()">
                    <option value="">所有平台</option>
                    <option value="抖音">抖音</option>
                    <option value="微博">微博</option>
                    <option value="Instagram">Instagram</option>
                    <option value="B站">B站</option>
                </select>
                <select id="typeFilter" class="filter-select" onchange="saveAndApplyFilters()">
                    <option value="">所有类型</option>
                    <option value="关注">关注</option>
                    <option value="喜欢">喜欢</option>
                </select>
                <select id="fileFilter" class="filter-select" onchange="saveAndApplyFilters()">
                    <option value="">所有附件</option>
                    <option value="视频">视频</option>
                    <option value="图片">图片</option>
                </select>
                <button class="btn-reset" onclick="resetFilters()"><i class="fas fa-undo"></i> 重置</button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                    <tr>
                        <th class="col-no">序号</th>
                        <th onclick="handleSort('id')" class="col-id">ID <i class="fas fa-sort"></i></th>
                        <th onclick="handleSort('time')" class="col-time">时间 <i class="fas fa-sort"></i></th>
                        <th onclick="handleSort('platform')" class="col-plat">平台 <i class="fas fa-sort"></i>
                        </th>
                        <th onclick="handleSort('type')" class="col-type">类型 <i class="fas fa-sort"></i></th>
                        <th onclick="handleSort('username')" class="col-user">用户名 <i class="fas fa-sort"></i>
                        </th>
                        <th class="col-content">文件名</th>
                        <th class="col-text">描述</th>
                        <th class="col-link">链接</th>
                    </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div class="messageinfo-bar">
                <div id="messageInfo" style="color:#889eb5">当前显示 x 条数据 (总共 x 条)</div>
            </div>
        </div>
    </div>

</div>

<script>
    // 全局变量
    const dp = document.getElementById('datePicker');
    const chartMsg = echarts.init(document.getElementById('chart-msg'), 'dark');
    const chartNested = echarts.init(document.getElementById('chart-nested'), 'dark');
    const chartHist = echarts.init(document.getElementById('chart-history'), 'dark');
    const commonOpt = {backgroundColor: 'transparent'};
    chartMsg.setOption(commonOpt);
    chartNested.setOption(commonOpt);
    chartHist.setOption(commonOpt);
    let tableRawData = [], tableFilteredData = [], currentSort = {col: 'time', dir: 'desc'};

    // --- 初始化 ---
    function initPage() {
        loadSavedState();
        restoreSortOrder();
        initSortables();
        initToggles();
        reloadData();
    }

    // --- 拖拽 ---
    function initSortables() {
        new Sortable(document.getElementById('main-sortable-container'), {
            animation: 150,
            handle: '.draggable-handle',
            onEnd: () => saveSortOrder('main-sortable-container')
        });
        new Sortable(document.getElementById('nice-inner-sortable'), {
            animation: 150,
            handle: '.sub-title',
            onEnd: () => saveSortOrder('nice-inner-sortable')
        });
        new Sortable(document.getElementById('cards-sortable'), {
            animation: 150,
            onEnd: () => saveSortOrder('cards-sortable')
        });
        new Sortable(document.getElementById('nice-charts-sortable'), {
            animation: 150, onEnd: () => {
                saveSortOrder('nice-charts-sortable');
                setTimeout(() => {
                    chartMsg.resize();
                    chartNested.resize();
                    chartHist.resize();
                }, 50);
            }
        });
        new Sortable(document.getElementById('tiktok-cards-sortable'), {
            animation: 150,
            onEnd: () => saveSortOrder('tiktok-cards-sortable')
        });
    }

    function saveSortOrder(id) {
        const order = Array.from(document.getElementById(id).children).map(el => el.getAttribute('data-id'));
        localStorage.setItem('sort-order-' + id, JSON.stringify(order));
    }

    function restoreSortOrder() {
        ['main-sortable-container', 'nice-inner-sortable', 'cards-sortable', 'nice-charts-sortable', 'tiktok-cards-sortable'].forEach(id => {
            const saved = JSON.parse(localStorage.getItem('sort-order-' + id));
            if (saved) {
                const c = document.getElementById(id);
                saved.forEach(childId => {
                    const el = c.querySelector(`[data-id="${childId}"]`);
                    if (el) c.appendChild(el);
                });
            }
        });
    }

    // --- 记忆 ---
    function loadSavedState() {
        const savedDate = localStorage.getItem('pref-date');
        dp.value = savedDate || new Date().toISOString().split('T')[0];
        const f = JSON.parse(localStorage.getItem('pref-filters') || '{}');
        if (f.search) document.getElementById('searchInput').value = f.search;
        if (f.plat) document.getElementById('platFilter').value = f.plat;
        if (f.type) document.getElementById('typeFilter').value = f.type;
        if (f.file) document.getElementById('fileFilter').value = f.file;
    }

    // --- 折叠 ---
    function toggleSection(id) {
        const c = document.getElementById(id);
        const i = document.getElementById('icon-' + id);
        const isHidden = c.classList.contains('hidden-content');
        if (isHidden) {
            c.classList.remove('hidden-content');
            if (i) {
                i.parentElement.classList.remove('collapsed');
                if (id.startsWith('sub-')) i.parentElement.classList.remove('sub-collapsed');
            }
            if (id === 'sec-nice' || id === 'sub-nice-charts') setTimeout(() => {
                chartMsg.resize();
                chartNested.resize();
                chartHist.resize();
            }, 50);
        } else {
            c.classList.add('hidden-content');
            if (i) {
                i.parentElement.classList.add('collapsed');
                if (id.startsWith('sub-')) i.parentElement.classList.add('sub-collapsed');
            }
        }
        localStorage.setItem('toggle-' + id, !isHidden);
    }

    function initToggles() {
        ['sec-nice', 'sub-nice-cards', 'sub-nice-charts', 'sec-tiktok', 'sec-table'].forEach(id => {
            if (localStorage.getItem('toggle-' + id) === 'true') {
                const c = document.getElementById(id);
                if (c) c.classList.add('hidden-content');
                const i = document.getElementById('icon-' + id);
                if (i) {
                    i.parentElement.classList.add('collapsed');
                    if (id.startsWith('sub-')) i.parentElement.classList.add('sub-collapsed');
                }
            }
        });
    }

    // --- 交互 ---
    function handleDateChange() {
        localStorage.setItem('pref-date', dp.value);
        reloadData();
    }

    function adjustDate(days) {
        dp.stepUp(days);
        handleDateChange();
    }

    function goToToday() {
        dp.valueAsDate = new Date();
        handleDateChange();
    }

    function saveAndApplyFilters() {
        const f = {
            search: document.getElementById('searchInput').value,
            plat: document.getElementById('platFilter').value,
            type: document.getElementById('typeFilter').value,
            file: document.getElementById('fileFilter').value
        };
        localStorage.setItem('pref-filters', JSON.stringify(f));
        applyFilters();
    }

    function filterByFile(type) {
        document.getElementById('fileFilter').value = type;
        saveAndApplyFilters();
        if (document.getElementById('sec-table').classList.contains('hidden-content')) toggleSection('sec-table');
        document.querySelector('.theme-table').scrollIntoView({behavior: "smooth"});
    }

    function resetFilters() {
        document.getElementById('searchInput').value = '';
        document.getElementById('platFilter').value = '';
        document.getElementById('typeFilter').value = '';
        document.getElementById('fileFilter').value = '';
        saveAndApplyFilters();
    }

    chartMsg.on('click', p => {
        let v = p.name === 'Instagram' ? 'Instagram' : p.name;
        document.getElementById('platFilter').value = v;
        saveAndApplyFilters();
        if (document.getElementById('sec-table').classList.contains('hidden-content')) toggleSection('sec-table');
        document.querySelector('.theme-table').scrollIntoView({behavior: "smooth"});
    });
    chartHist.on('click', p => {
        dp.value = p.name;
        handleDateChange();
    });

    // 联动
    chartNested.on('click', p => {
        if (['抖音', '微博', 'Instagram', '其他'].includes(p.name)) {
            let v = p.name === 'Instagram' ? 'Instagram' : p.name;
            document.getElementById('platFilter').value = v;
        } else if (['关注', '喜欢'].includes(p.name)) {
            document.getElementById('typeFilter').value = p.name;
        }
        saveAndApplyFilters();
        if (document.getElementById('sec-table').classList.contains('hidden-content')) toggleSection('sec-table');
        document.querySelector('.theme-table').scrollIntoView({behavior: "smooth"});
    });

    // --- 数据 ---
    async function reloadData() {
        const date = dp.value;
        if (!date) return;
        await Promise.all([loadNiceMe(date), loadWorksDist(date), loadTikTok(date), loadTableData(date)]);
    }

    async function loadNiceMe(date) {
        try {
            const res = await fetch(`api/niceme?date=${date}`), json = await res.json();
            if (json.status === 'empty') return;
            const d = json.data;

            // 容错处理
            if (!d.msg_platforms) d.msg_platforms = {};

            // 更新卡片数字... (保持原样)
            document.getElementById('nice-total').innerText = d.total;
            document.getElementById('nice-users').innerText = d.users;
            document.getElementById('nice-works').innerText = d.works;
            document.getElementById('nice-files-video').innerText = d.files.video;
            document.getElementById('nice-files-image').innerText = d.files.image;

            renderTrend('nice-total-trend', d.total_trend, d.total_prev);
            renderTrend('nice-users-trend', d.users_trend, d.users_prev);
            renderTrend('nice-works-trend', d.works_trend, d.works_prev);
            renderTrend('nice-files-trend', d.files_trend, d.files_prev_str);

            // --- 修改开始：消息分布图表 ---
            const msgData = Object.keys(d.msg_platforms).map(k => ({name: k, value: d.msg_platforms[k]}));

            chartMsg.setOption({
                title: [
                    {text: '消息分布', left: 'center', textStyle: {fontSize: 18, color: '#fff'}},
                    {
                        text: d.total,
                        subtext: '今日消息',
                        left: 'center',
                        top: '45%',
                        textStyle: {fontSize: 28, color: '#fff'},
                        subtextStyle: {fontSize: 14, color: '#bbb'}
                    }
                ],
                tooltip: {trigger: 'item'},
                // 1. 添加图例
                legend: {
                    bottom: '0%',
                    left: 'center',
                    itemWidth: 10, itemHeight: 10,
                    textStyle: {color: '#ccc'}
                },
                series: [{
                    type: 'pie',
                    cursor: 'pointer',
                    radius: ['50%', '70%'], // 稍微调小一点给线留位置
                    center: ['50%', '52%'],
                    // 2. 去除黑边：不再设置 borderColor
                    itemStyle: {borderRadius: 4},
                    data: msgData,
                    label: {
                        show: true,
                        formatter: '{b}\n{c}',
                        color: '#fff',
                        fontSize: 14,
                        fontWeight: 'bold'
                    },
                }]
            });

            // --- 趋势图保持不变 ---
            chartHist.setOption({
                title: {text: '近七天趋势', left: 'center', textStyle: {fontSize: 18, color: '#fff'}},
                tooltip: {trigger: 'axis', axisPointer: {type: 'shadow'}},
                legend: {top: 30, right: 10},
                grid: {left: '3%', right: '3%', bottom: '5%', top: '20%', containLabel: true},
                xAxis: {type: 'category', data: d.history.dates, axisLabel: {fontSize: 12}},
                yAxis: {type: 'value', splitLine: {lineStyle: {color: '#2a3b55'}}, axisLabel: {fontSize: 12}},
                series: [
                    {
                        name: '消息',
                        type: 'bar',
                        cursor: 'pointer',
                        data: d.history.msgs,
                        itemStyle: {color: '#00f2ff'},
                        label: {show: true, position: 'top', color: '#00f2ff', fontWeight: 'bold'}
                    },
                    {
                        name: '作品',
                        type: 'bar',
                        cursor: 'pointer',
                        data: d.history.works,
                        itemStyle: {color: '#00ff9d'},
                        label: {show: true, position: 'top', color: '#00ff9d', fontWeight: 'bold'}
                    },
                    {
                        name: '用户',
                        type: 'bar',
                        cursor: 'pointer',
                        data: d.history.users,
                        itemStyle: {color: '#bd00ff'},
                        label: {show: true, position: 'top', color: '#bd00ff', fontWeight: 'bold'}
                    }
                ]
            });
        } catch (e) {
            console.error(e);
        }
    }

    async function loadWorksDist(date) {
        try {
            const res = await fetch(`api/niceme/works_dist?date=${date}`), d = await res.json();
            const platforms = Object.keys(d.platforms).map(k => ({name: k, value: d.platforms[k]}));
            const types = Object.keys(d.types).map(k => ({name: k, value: d.types[k]}));

            const allLegends = [...Object.keys(d.platforms), '关注', '喜欢'];

            chartNested.setOption({
                backgroundColor: 'transparent',
                title: [
                    {
                        text: '作品分布', left: 'center', top: 10,
                        textStyle: {fontSize: 18, color: '#fff', fontWeight: 'bold'}
                    },
                    {
                        text: d.total,
                        subtext: '今日作品',
                        left: 'center', top: '45%',
                        textStyle: {
                            fontSize: 32,
                            color: '#fff',
                            fontWeight: 'bold',
                            textShadowBlur: 5,
                            textShadowColor: '#00f2ff'
                        },
                        subtextStyle: {fontSize: 12, color: '#aaa'}
                    }
                ],
                tooltip: {trigger: 'item', formatter: '{b}: {c} ({d}%)'},
                legend: {
                    bottom: 0, left: 'center', data: allLegends,
                    itemWidth: 10, itemHeight: 10, textStyle: {color: '#ccc', fontSize: 11}
                },
                series: [
                    // --- 内圈：平台 ---
                    {
                        name: '平台',
                        type: 'pie',
                        cursor: 'pointer',
                        radius: ['35%', '50%'],
                        center: ['50%', '55%'],
                        itemStyle: {borderRadius: 2},
                        z: 10, // 层级高，防止线被外圈遮挡
                        data: platforms,

                        label: {
                            show: true,
                            position: 'outside',
                            formatter: '{b}\n{c}',
                            fontSize: 14,
                            color: 'inherit',
                            // 【核心】强制对齐到边缘
                            alignTo: 'edge',
                            margin: 10 // 离边缘的距离
                        },
                        labelLine: {
                            show: true,
                            length: 20,  // 第一段：穿出外圈
                            length2: 0,  // 第二段：由 alignTo 控制，设为0交给系统计算
                            minTurnAngle: 70
                        },
                        // 布局策略：垂直方向自动避让
                        labelLayout: {
                            hideOverlap: false,
                            moveOverlap: 'shiftY'
                        }
                    },

                    // --- 外圈：类型 ---
                    {
                        name: '类型',
                        type: 'pie',
                        cursor: 'pointer',
                        radius: ['55%', '70%'],
                        center: ['50%', '55%'],
                        itemStyle: {borderRadius: 2},
                        data: [
                            {name: '关注', value: d.types['关注'] || 0, itemStyle: {color: '#00ff9d'}},
                            {name: '喜欢', value: d.types['喜欢'] || 0, itemStyle: {color: '#ffcc00'}}
                        ],

                        label: {
                            show: true,
                            position: 'outside',
                            formatter: '{b}\n{c}',
                            fontSize: 14,
                            fontWeight: 'bold',
                            color: 'inherit',
                            // 【核心】同样对齐到边缘，但在垂直方向和内圈错开
                            alignTo: 'edge',
                            margin: 20 // 稍微错开一点位置
                        },
                        labelLine: {
                            show: true,
                            length: 20,
                            length2: 0
                        },
                        labelLayout: {
                            hideOverlap: false,
                            moveOverlap: 'shiftY'
                        }
                    }
                ]
            }, true);
        } catch (e) {
            console.error(e);
        }
    }

    async function loadTikTok(date) {
        const p1 = fetch(`api/tiktok/scraped?date=${date}`).then(r => r.json()).then(d => {
            document.getElementById('tk-scraped').innerText = d.val;
            renderTrend('tk-scraped-trend', d.trend, d.prev)
        });
        const p2 = fetch(`api/tiktok/active?date=${date}`).then(r => r.json()).then(d => {
            document.getElementById('tk-active').innerText = d.val;
            renderTrend('tk-active-trend', d.trend, d.prev);
            window.tk_active_val = d.val
        });
        const p3 = fetch(`api/tiktok/new?date=${date}`).then(r => r.json()).then(d => {
            document.getElementById('tk-new').innerText = d.val;
            renderTrend('tk-new-trend', d.trend, d.prev)
        });
        await Promise.all([p1, p2, p3]);
        const s = parseInt(document.getElementById('tk-scraped').innerText) || 0, a = window.tk_active_val || 0;
        document.getElementById('tk-avg').innerText = a > 0 ? (s / a).toFixed(1) : "0";
    }

    async function loadTableData(date) {
        try {
            const res = await fetch(`api/list/niceme_messages?date=${date}`), json = await res.json();
            tableRawData = json.data;
            applyFilters();
        } catch (e) {
        }
    }

    function renderTrend(id, p, v) {
        const el = document.getElementById(id);
        if (!el) return;
        if (v != null) el.title = `昨日数据: ${v}`;
        if (p > 0) {
            el.innerHTML = `▲ ${p}%`;
            el.className = 'trend-badge trend-up'
        } else if (p < 0) {
            el.innerHTML = `▼ ${Math.abs(p)}%`;
            el.className = 'trend-badge trend-down'
        } else {
            el.innerHTML = '-';
            el.className = 'trend-badge trend-flat'
        }
    }

    function applyFilters() {
        const s = document.getElementById('searchInput').value.toLowerCase(),
            p = document.getElementById('platFilter').value, t = document.getElementById('typeFilter').value,
            f = document.getElementById('fileFilter').value;
        tableFilteredData = tableRawData.filter(i => (!s || String(i.id).includes(s) || i.username.toLowerCase().includes(s) || (i.caption && i.caption.toLowerCase().includes(s))) && (!p || i.platform === p) && (!t || i.type === t) && (!f || i.file_type === f));
        doSort();
        renderTable();
    }

    function handleSort(c) {
        if (currentSort.col === c) currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc'; else {
            currentSort.col = c;
            currentSort.dir = 'desc'
        }
        document.querySelectorAll('th').forEach(th => th.className = th.className.replace(/sort-(asc|desc)/, ''));
        const th = document.querySelector(`th[onclick="handleSort('${c}')"]`);
        if (th) {
            th.classList.add(`sort-${currentSort.dir}`);
            th.querySelector('i').className = currentSort.dir === 'asc' ? 'fas fa-sort-up' : 'fas fa-sort-down'
        }
        doSort();
        renderTable();
    }

    function doSort() {
        const {col, dir} = currentSort, isNum = (col === 'id');
        tableFilteredData.sort((a, b) => {
            let vA = a[col], vB = b[col];
            if (vA === vB) return 0;
            let r = isNum ? vA - vB : String(vA).localeCompare(String(vB));
            return dir === 'asc' ? r : -r;
        });
    }

    function renderTable() {
        const tb = document.getElementById('tableBody'), st = document.getElementById('messageInfo');
        if (tableFilteredData.length === 0) {
            tb.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:30px;color:#666">无数据</td></tr>';
            st.innerText = '共 0 条';
            return
        }
        tb.innerHTML = tableFilteredData.map((r, i) => {
            let ico = '<i class="fas fa-globe plat-icon"></i>';
            if (r.platform === '抖音') ico = '<i class="fab fa-tiktok plat-icon c-douyin"></i>';
            if (r.platform === '微博') ico = '<i class="fab fa-weibo plat-icon c-weibo"></i>';
            if (r.platform === 'Instagram') ico = '<i class="fab fa-instagram plat-icon c-ins"></i>';
            if (r.platform === 'B站') ico = '<i class="fab fa-bilibili plat-icon c-ins"></i>';
            return `<tr>
                <td class="col-no">${i + 1}</td>
                <td class="col-id">${r.id}</td>
                <td class="col-time">${r.time}</td>
                <td class="col-plat">${ico} ${r.platform}</td>
                <td class="col-type"><span class="badge ${r.type === '关注' ? 'type-follow' : 'type-like'}">${r.type}</span></td>
                <td class="col-user">${r.username ? `<a href="/board/user/${r.username}" target="_blank" class="btn-link">${r.username}</a>` : ''}</td>
                <td class="col-content" title="${r.caption}">${r.caption || ''}</td>
                <td class="col-text" title="${r.text}">${r.text || ''}</td>
                <td class="col-link">${r.url ? `<a href="${r.url}" target="_blank" class="btn-link">${r.url}</a>` : ''}</td></tr>`;
        }).join('');
        st.innerText = `当前显示 ${tableFilteredData.length} 条数据 (总共 ${tableRawData.length} 条)`;
    }

    initPage();
    window.onresize = () => {
        chartMsg.resize();
        chartNested.resize();
        chartHist.resize()
    };
</script>
</body>

</html>
