<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>User 表管理</title>
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CSS 变量实现主题支持 */
        :root {
            --bg-color: #0b0f19;
            --text-color: #fff;
            --box-bg: #161b29;
            --border-color: #2a3b55;
            --btn-text: #00f2ff;
        }

        body.light-theme {
            --bg-color: #f4f6f8;
            --text-color: #333;
            --box-bg: #ffffff;
            --border-color: #d1d5db;
            --btn-text: #007bff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .toolbar {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--box-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 12px;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: var(--text-color);
            outline: none;
            font-size: 14px;
        }

        .btn {
            border: 1px solid var(--btn-text);
            background: transparent;
            color: var(--btn-text);
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn:hover {
            background: var(--btn-text);
            color: var(--bg-color);
        }

        /* 给 ag-grid 分配高度 */
        #myGrid {
            height: calc(100vh - 120px);
            width: 100%;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🚀 User<span>表管理</span></h1>
    <div class="toolbar">
        <div class="search-box">
            <i class="fas fa-search" style="margin-right:8px; color:#889eb5;"></i>
            <input type="text" id="quickFilter" placeholder="输入关键字快速搜索..." oninput="onFilterTextBoxChanged()">
        </div>
        <button class="btn" onclick="toggleTheme()">🌓 切换主题</button>
        <a href="/" class="btn">返回首页</a> </div>
</div>

<div id="myGrid" class="ag-theme-alpine-dark"></div>

<script>
    // ========== 1. 主题切换机制 ==========
    function applyTheme(isLight) {
        const gridDiv = document.getElementById('myGrid');
        if (isLight) {
            document.body.classList.add('light-theme');
            gridDiv.className = 'ag-theme-alpine'; // ag-grid 浅色皮肤
        } else {
            document.body.classList.remove('light-theme');
            gridDiv.className = 'ag-theme-alpine-dark'; // ag-grid 深色皮肤
        }
    }

    function toggleTheme() {
        const isLight = !document.body.classList.contains('light-theme');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        applyTheme(isLight);
    }

    const savedTheme = localStorage.getItem('theme');
    applyTheme(savedTheme === 'light');


    // ========== 2. Ag-Grid 业务逻辑 ==========
    // 全局声明 gridApi 变量以供后续调用
    let gridApi;

    const gridOptions = {
        defaultColDef: {
            flex: 1,
            minWidth: 120,
            editable: true,     // 默认所有字段都可以双击编辑
            sortable: true,     // 点击表头排序
            filter: true,       // 允许列漏斗过滤
            resizable: true     // 允许拖动列宽
        },
        columnDefs: [],         // 稍后由接口数据动态生成
        rowData: [],
        pagination: true,
        paginationPageSize: 50,
        
        // 单元格编辑完成事件
        onCellValueChanged: async function(params) {
            const field = params.colDef.field;
            const newValue = params.newValue;
            const oldValue = params.oldValue;
            const userId = params.data.USERID;

            // 数据没变则忽略
            if (newValue === oldValue) return;

            const payload = {};
            payload[field] = newValue;

            try {
                // 如果实际部署路径为 /board/api/niceme/users ，请调整这里的 URL
                const res = await fetch(`/board/api/niceme/users/${userId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                if (data.status !== 'success') {
                    alert('更新失败: ' + data.msg);
                    params.node.setDataValue(field, oldValue); // 失败时回滚显示旧值
                }
            } catch (error) {
                console.error('更新请求异常', error);
                alert('网络异常，更新失败');
                params.node.setDataValue(field, oldValue); // 失败时回滚显示旧值
            }
        }
    };

    function onFilterTextBoxChanged() {
        // 使用新版 API 设置快速搜索文本
        if (gridApi) {
            gridApi.setGridOption('quickFilterText', document.getElementById('quickFilter').value);
        }
    }

    document.addEventListener('DOMContentLoaded', async () => {
        const gridDiv = document.querySelector('#myGrid');
        
        // 使用工厂函数创建 grid 并接收 API 实例
        gridApi = agGrid.createGrid(gridDiv, gridOptions);

        try {
            // 请求后端数据
            const res = await fetch('/board/api/niceme/users'); 
            const result = await res.json();
            
            if (result.status === 'success' && result.data.length > 0) {
                // 动态提取所有的 key 作为列配置
                const firstRow = result.data[0];
                const columns = Object.keys(firstRow).map(key => {
                    return {
                        field: key,
                        headerName: key.toUpperCase(),
                        // 仅 USERID 被设为不可编辑
                        editable: key !== 'USERID'
                    };
                });
                
                // 将 USERID 移动到第一列以提高辨识度
                const userIdIndex = columns.findIndex(c => c.field === 'USERID');
                if(userIdIndex > 0){
                    const idCol = columns.splice(userIdIndex, 1)[0];
                    columns.unshift(idCol);
                }

                // 使用 setGridOption 更新配置
                gridApi.setGridOption('columnDefs', columns);
                gridApi.setGridOption('rowData', result.data);
            }
        } catch (error) {
            console.error('加载数据失败', error);
        }
    });
</script>
</body>
</html>
